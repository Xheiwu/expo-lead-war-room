services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: expo_leads
      POSTGRES_USER: expo_user
      POSTGRES_PASSWORD: change-me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expo_user -d expo_leads"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - server/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy --schema prisma.postgres/schema.prisma && node dist/src/index.js"
    expose:
      - "4000"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_BASE: /api
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  postgres_data:
